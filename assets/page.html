	<body>
		<header>
			<div id="header-inner">
				<h1 id="title">iTL 空き教室</h1>
				<p id="description">
					中央大学市ヶ谷田町キャンパスの各教室の空き状況を確認できます。データは約10分おきに更新されます。
				</p>
				<p id="credit">
					運営：<a href="https://gdgoc-chuo.com">GDGoC 中央大学</a>
				</p>
			</div>
		</header>
		<main>
			<div id="main-inner">
				<form id="search-form">
					<input id="date-input" type="date" />
					<button id="search-button" disabled>検索</button>
				</form>
				<div id="availability-placeholder">
					<div id="availability-placeholder-table">
						<div id="availability-placeholder-table-loading">
							<p>データを取得中...</p>
						</div>
						<div
							id="availability-placeholder-table-error"
							class="hidden"
						>
							<p>エラーが発生しました。</p>
						</div>
						<div
							id="availability-placeholder-table-no-data"
							class="hidden"
						>
							<p>データが見つかりませんでした。</p>
						</div>
					</div>
				</div>
				<div id="availability-success" class="hidden">
					<div id="availability-table-wrapper">
						<table id="availability-table">
							<thead>
								<tr>
									<th>教室</th>
									<th>1限前</th>
									<th>1限</th>
									<th>2限</th>
									<th>教室</th>
									<th>3限</th>
									<th>4限</th>
									<th>5限</th>
									<th>6限</th>
									<th>6限後</th>
								</tr>
							</thead>
							<tbody id="availability-table-body"></tbody>
						</table>
					</div>
				</div>
			</div>
		</main>
		<script type="module" src="/script.js"></script>
